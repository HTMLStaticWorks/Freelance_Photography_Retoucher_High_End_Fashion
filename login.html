<!DOCTYPE html>
<html dir="ltr" lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Login - RAW Premium Retouching
  </title>
  <meta content="Login to your RAW account to manage your retouching projects." name="description"/>
  <link href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" rel="icon"/>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
   tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        luxury: {
                            50: '#f7f7f8',
                            100: '#efeff1',
                            200: '#dcdce0',
                            300: '#bebec6',
                            400: '#9b9ba6',
                            500: '#7e7e8b',
                            600: '#646471',
                            700: '#53535d',
                            800: '#46464d',
                            900: '#1a1a1a',
                        }
                    }
                }
            }
        }
  </script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Custom CSS -->
   <link href="assets/css/style.css" rel="stylesheet">
   <link href="assets/css/dark-mode.css" rel="stylesheet"/>
   <link href="assets/css/rtl.css" rel="stylesheet"/>
  <style>
    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .dark .glass-card {
        background: rgba(26, 26, 26, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
 </head>
 <body class="antialiased transition-colors duration-300 bg-white dark:bg-black">
   <!-- Theme & RTL Controls -->
   <div class="fixed top-1 end-1 md:top-8 md:end-8 z-50 flex items-center space-x-2 md:space-x-4">
       <button class="theme-toggle p-2 rounded-full bg-black/5 dark:bg-white/10 backdrop-blur-md border border-black/10 dark:border-white/20 text-black dark:text-white hover:bg-black/20 dark:hover:bg-white/20 transition-all transform hover:rotate-12 active:scale-90 shadow-sm">
           <i class="ph ph-moon text-lg md:text-xl dark:hidden"></i>
           <i class="ph ph-sun text-lg md:text-xl hidden dark:block"></i>
       </button>
       <button class="rtl-toggle text-[10px] md:text-xs font-bold px-3 py-2 rounded-full bg-black/5 dark:bg-white/10 backdrop-blur-md border border-black/10 dark:border-white/20 text-black dark:text-white hover:bg-black/20 dark:hover:bg-white/20 transition-all transform hover:scale-110 active:scale-95 shadow-sm">
           RTL
       </button>
   </div>
  <main class="min-h-screen flex items-center justify-center relative overflow-hidden px-4">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
      <img alt="Fashion Background" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80&w=2000"/>
      <div class="absolute inset-0 bg-black/30 dark:bg-black/60 backdrop-blur-sm"></div>
    </div>

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-md mt-10 md:mt-0" data-aos="fade-up">
        <div class="glass-card rounded-3xl p-4 md:p-10 shadow-2xl">
            <!-- Logo -->
            <div class="text-center mb-6 md:mb-10">
                <a class="font-serif text-2xl md:text-3xl font-bold tracking-[0.3em] inline-flex items-center group" href="index.html">
                    <span class="logo-bolt me-3">⚡</span>RAW
                </a>
                <p class="text-gray-500 dark:text-gray-400 mt-2 md:mt-4 text-[10px] md:text-sm font-medium uppercase tracking-widest">Welcome Back</p>
            </div>

            <form class="space-y-3 md:space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-2" for="email">Email Address</label>
                    <input class="w-full bg-white/50 dark:bg-black/50 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black dark:focus:ring-white transition-all text-sm" id="email" placeholder="name@example.com" type="email" required/>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-2" for="password">Password</label>
                    <div class="relative">
                        <input class="w-full bg-white/50 dark:bg-black/50 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black dark:focus:ring-white transition-all text-sm" id="password" placeholder="••••••••" type="password" required/>
                        <button type="button" id="toggle-password" class="absolute end-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black dark:hover:text-white transition-colors">
                            <i class="ph ph-eye text-xl" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-black focus:ring-black">
                        <label for="remember" class="ms-2 text-xs text-gray-500 dark:text-gray-400 font-medium">Remember for 30 days</label>
                    </div>
                    <a href="#" class="text-[10px] uppercase font-bold tracking-widest text-gray-400 hover:text-black dark:hover:text-white transition-colors">Forgot password?</a>
                </div>

                <button class="w-full bg-black dark:bg-white text-white dark:text-black font-bold py-3 md:py-4 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg" type="submit">
                    Login
                </button>

                <!-- Social Login -->
                <div class="relative py-1 md:py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase font-bold tracking-widest">
                        <span class="bg-white dark:bg-[#2a2a2a] px-4 text-gray-400">Or continue with</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button type="button" class="flex items-center justify-center bg-white/50 dark:bg-black/50 border border-gray-200 dark:border-gray-800 py-3 rounded-xl hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all group">
                        <i class="ph ph-google-logo text-xl me-2 transition-transform group-hover:scale-110"></i>
                        <span class="text-xs font-bold uppercase tracking-widest">Google</span>
                    </button>
                    <button type="button" class="flex items-center justify-center bg-white/50 dark:bg-black/50 border border-gray-200 dark:border-gray-800 py-3 rounded-xl hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all group">
                        <i class="ph ph-apple-logo text-xl me-2 transition-transform group-hover:scale-110"></i>
                        <span class="text-xs font-bold uppercase tracking-widest">Apple</span>
                    </button>
                </div>
            </form>

            <div class="mt-4 pt-4 md:mt-8 md:pt-8 border-t border-gray-200 dark:border-gray-800 text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Don't have an account? 
                    <a href="signup.html" class="text-black dark:text-white font-bold hover:underline underline-offset-4 ms-1">Create Account</a>
                </p>
            </div>
        </div>

    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    AOS.init({
        duration: 1000,
        once: true
    });

    // Password Toggle Logic
    const passwordInput = document.getElementById('password');
    const toggleButton = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');

    if (toggleButton && passwordInput && eyeIcon) {
        toggleButton.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle icon
            if (type === 'text') {
                eyeIcon.classList.replace('ph-eye', 'ph-eye-slash');
            } else {
                eyeIcon.classList.replace('ph-eye-slash', 'ph-eye');
            }
        });
    }

    // Login Redirect Logic
    const loginForm = document.querySelector('form');
    if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // In a real app, you would validate credentials here
            window.location.href = 'dashboard.html';
        });
    }
  </script>
 
  <button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <i class="ph ph-caret-up"></i>
  </button>
 </body>
</html>
