<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

    <title>404 Not Found - RetouchStudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { luxury: { 50: '#f7f7f8', 900: '#1a1a1a', } } } } }</script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>
<body class="antialiased bg-white dark:bg-black transition-colors duration-300">

    <header class="fixed w-full top-0 z-50 glass">

        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">

        </div>
    </header>

    <main class="min-h-screen pt-32 pb-24 flex flex-col justify-center">
        <div class="max-w-4xl mx-auto px-4 text-center">
            
            <!-- SECTION 1 & 2: Animated 404 headline & Creative illustration -->
            <div class="relative mb-12" data-aos="zoom-in">

                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10 dark:opacity-20">
                    <i class="ph-fill ph-camera text-[20rem]"></i>
                </div>
                
                <h1 class="font-serif text-9xl md:text-[12rem] font-bold tracking-tighter leading-none mb-4 relative z-10">404</h1>
                <p class="text-xs font-bold uppercase tracking-[0.5em] text-gray-500 relative z-10 mb-8">Page Not Found</p>
                <h2 class="font-serif text-3xl md:text-4xl font-bold relative z-10 mb-6">Looks like we lost focus.</h2>
                <p class="text-gray-500 max-w-lg mx-auto relative z-10 text-lg">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            </div>

            <!-- SECTION 3: Navigation buttons -->
            <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4 mb-24 relative z-10" data-aos="fade-up" data-aos-delay="100">
                <a href="index.html" class="bg-black text-white dark:bg-white dark:text-black px-8 py-4 rounded-full font-bold uppercase tracking-wider hover:scale-105 transition-transform flex items-center justify-center">
                    <i class="ph ph-house mr-2 text-xl"></i> Back to Homepage
                </a>
                <a href="contact.html" class="border border-black dark:border-white px-8 py-4 rounded-full font-bold uppercase tracking-wider hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors flex items-center justify-center">
                    Contact Support
                </a>
            </div>

            <!-- SECTION 4: Suggested pages section -->
            <div class="text-left max-w-2xl mx-auto border-t border-gray-200 dark:border-gray-800 pt-12 relative z-10" data-aos="fade-up" data-aos-delay="200">
                <h3 class="font-bold uppercase tracking-widest text-xs text-gray-400 mb-6 text-center">Suggested Links</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center text-sm font-medium">
                    <a href="services.html" class="p-4 bg-luxury-50 dark:bg-luxury-900 rounded-lg hover:text-gray-500 transition-colors">Services</a>
                    <a href="pricing.html" class="p-4 bg-luxury-50 dark:bg-luxury-900 rounded-lg hover:text-gray-500 transition-colors">Pricing</a>
                    <a href="blog.html" class="p-4 bg-luxury-50 dark:bg-luxury-900 rounded-lg hover:text-gray-500 transition-colors">Journal</a>
                    <a href="login.html" class="p-4 bg-luxury-50 dark:bg-luxury-900 rounded-lg hover:text-gray-500 transition-colors">Client Portal</a>
                </div>
            </div>

        </div>

    <footer class="bg-white dark:bg-black py-10 text-center text-sm text-gray-500 border-t border-gray-200 dark:border-gray-800">
        <p>&copy; 2026 RetouchStudio.</p>
